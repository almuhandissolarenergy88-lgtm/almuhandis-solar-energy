<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاريعنا - AL-MUHANDIS</title>
    <!-- ربط نفس ملفات التصميم لضمان ثبات الشكل -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .project-img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .gallery { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px; }
        @media (min-width: 600px) { .gallery { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <!-- القائمة العلوية -->
    <nav class="navbar" id="mainMenu" style="background: #003366; padding: 15px; display: flex; justify-content: space-around;">
        <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">الرئيسية</a>
        <a href="projects.html" style="color:#25d366; text-decoration:none; font-weight:bold;">مشاريعنا</a>
    </nav>

    <h2 style="text-align:center; color:white; margin-top:20px;">معرض أعمالنا</h2>
    
    <!-- منطقة المشاريع -->
    <div class="gallery">
        <!-- مشروع 1 -->
        <div class="card">
            <img src="images/project1.jpg" alt="مشروع طاقة شمسية" class="project-img">
            <h3>محطة طاقة شمسية - المزرعة</h3>
            <p>تركيب ألواح بقدرة 50 كيلو وات</p>
        </div>
        
        <!-- مشروع 2 -->
        <div class="card">
            <img src="images/project2.jpg" alt="طلمبات مياه" class="project-img">

            <p>تشغيل طلمبة غاطسة بعمق 100 متر</p>
        </div>
    </div>

    <!-- إضافة ملف القائمة لتوحيدها في كل الصفحات -->
    <script src="js/menu.js"></script>
</body>
</html>
